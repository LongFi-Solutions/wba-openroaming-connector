# Stub radsecproxy config for CI testing.
# Placeholders replaced with safe dummy values.
# Real certs are generated by the CI workflow and mounted at /etc/radsecproxy/certs.

ListenUDP   *:11812
ListenUDP   *:11813
ListenTLS   *:2083

LogLevel    3
LogThreadId on

tls OR-client {
    CACertificateFile  /etc/radsecproxy/certs/chain/WBA_OpenRoaming_Root.pem
    CertificateFile    /etc/radsecproxy/certs/chain.pem
    CertificateKeyFile /etc/radsecproxy/certs/key.pem
    TLSVersion TLS1_2:
}

client 127.0.0.1 {
    host   127.0.0.1
    type   udp
    secret testing123
}

client 0.0.0.0/0 {
    type               tls
    tls                OR-client
    secret             radsec
    CertificateNameCheck off
}

server OR-dynamic {
    type                 tls
    tls                  OR-client
    secret               radsec
    certificateNameCheck off
    dynamicLookupCommand /etc/radsecproxy/naptr-openroaming.sh
}

server localproxy {
    type         udp
    host         127.0.0.1
    port         1812
    secret       radsec
    statusServer on
}

server localproxy-acct {
    type         udp
    host         127.0.0.1
    port         1813
    secret       radsec
    statusServer on
}

realm /.*@ci\.example\.com$/ {
    server           localproxy
    accountingServer localproxy-acct
    accountingResponse on
}

realm /@.+\..+$/ {
    server           OR-dynamic
    accountingServer OR-dynamic
    accountingResponse on
}
