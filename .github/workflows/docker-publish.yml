name: Docker

on:
  schedule:
    - cron: "29 21 * * *"
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD & TEST
  # Builds both Docker images, validates they actually work, then pushes to
  # ghcr.io. On pull requests the push is skipped — CI still runs fully so
  # you know the PR is safe before merging.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Generate self-signed certs used only for CI validation.
      # radsecproxy needs them mounted at runtime.
      # freeradius bakes them into the image at build time (Dockerfile chowns them).
      - name: Generate test certificates
        run: |
          mkdir -p /tmp/ci-certs/chain
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/ci-certs/key.pem \
            -out    /tmp/ci-certs/cert.pem \
            -days 1 -nodes -subj "/CN=ci-test"
          cp /tmp/ci-certs/cert.pem /tmp/ci-certs/chain.pem
          cp /tmp/ci-certs/cert.pem /tmp/ci-certs/chain/WBA_OpenRoaming_Root.pem
          cp /tmp/ci-certs/cert.pem hybrid/configs/freeradius/certs/cert.pem
          cp /tmp/ci-certs/key.pem  hybrid/configs/freeradius/certs/privkey.pem
          cp /tmp/ci-certs/cert.pem hybrid/configs/freeradius/certs/fullchain.pem

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── radsecproxy ──────────────────────────────────────────────────────────

      - name: Build radsecproxy image
        uses: docker/build-push-action@v6
        with:
          context: ./hybrid
          file: ./hybrid/Dockerfile
          push: false
          load: true
          tags: radsecproxy:ci-test
          cache-from: type=gha,scope=radsecproxy
          cache-to: type=gha,mode=max,scope=radsecproxy

      # Start the container with the stub config and CI certs, wait 5 seconds,
      # then check it is still running. A bad config causes an immediate crash.
      - name: Test radsecproxy starts cleanly
        run: |
          docker run -d --name radsec-test \
            -v "${{ github.workspace }}/.github/ci/radsecproxy-test.conf:/etc/radsecproxy.conf" \
            -v "/tmp/ci-certs:/etc/radsecproxy/certs" \
            radsecproxy:ci-test

          sleep 5

          if [ "$(docker inspect -f '{{.State.Running}}' radsec-test)" != "true" ]; then
            echo "radsecproxy crashed on startup — logs:"
            docker logs radsec-test
            docker rm radsec-test
            exit 1
          fi

          echo "radsecproxy is running"
          docker stop radsec-test
          docker rm radsec-test

      # Rebuild from the GHA cache (fast — all layers already cached above)
      # and push to the registry now that the image is confirmed working.
      - name: Push radsecproxy image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./hybrid
          file: ./hybrid/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/radsecproxy:${{ github.ref_name }}
          cache-from: type=gha,scope=radsecproxy

      # ── freeradius ───────────────────────────────────────────────────────────

      - name: Build freeradius image
        uses: docker/build-push-action@v6
        with:
          context: ./hybrid
          file: ./hybrid/DockerfileFreeRadius
          push: false
          load: true
          tags: freeradius:ci-test
          cache-from: type=gha,scope=freeradius
          cache-to: type=gha,mode=max,scope=freeradius

      # radiusd -XC validates the entire config and exits without starting the
      # server or binding any ports. A non-zero exit means the config is broken.
      - name: Test freeradius config is valid
        run: |
          docker run --rm --add-host=radsecproxy:127.0.0.1 freeradius:ci-test radiusd -XC
          echo "freeradius config is valid"

      - name: Push freeradius image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./hybrid
          file: ./hybrid/DockerfileFreeRadius
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/freeradius:${{ github.ref_name }}
          cache-from: type=gha,scope=freeradius

  # ─────────────────────────────────────────────────────────────────────────────
  # DEPLOY
  # Authenticates to GCP via Workload Identity Federation, then SSHes into the
  # VM through the IAP tunnel (no open port 22 needed). Pulls the tested images
  # from ghcr.io and restarts the stack.
  # Only runs on push to main — not on PRs, tag pushes, or scheduled runs.
  #
  # Required secrets:
  #   GCP_WORKLOAD_IDENTITY_PROVIDER — WIF provider resource name
  #   GCP_SERVICE_ACCOUNT            — service account email
  #   GCP_PROJECT_ID                 — GCP project ID
  #   GCP_ZONE                       — VM zone (e.g. us-central1-a)
  #   DEPLOY_HOST                    — VM instance name (not IP)
  #   DEPLOY_USER                    — Linux user on the VM
  #   GHCR_TOKEN                     — GitHub PAT with read:packages scope
  #
  # Required IAM roles on the service account:
  #   roles/iap.tunnelResourceAccessor
  #   roles/compute.osLogin
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Debug OIDC token claims
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.googleapis.com")
          echo $OIDC_TOKEN | python3 -c "
          import sys,json,base64
          token=json.load(sys.stdin)['value'].split('.')[1]
          padded=token+'=='*3
          claims=json.loads(base64.b64decode(padded))
          print('repository:', claims.get('repository'))
          print('repository_owner:', claims.get('repository_owner'))
          print('sub:', claims.get('sub'))
          "

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug auth
        run: |
          gcloud auth list
          gcloud config list account
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Deploy to connector VM via IAP
        run: |
          gcloud compute ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            --tunnel-through-iap \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --command="
              set -e
              cd /root/wba-openroaming-connector/hybrid
              echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
              RADSECPROXY_IMAGE=ghcr.io/${{ env.REPO_LC }}/radsecproxy:main \
              FREERADIUS_IMAGE=ghcr.io/${{ env.REPO_LC }}/freeradius:main \
              docker compose pull
              RADSECPROXY_IMAGE=ghcr.io/${{ env.REPO_LC }}/radsecproxy:main \
              FREERADIUS_IMAGE=ghcr.io/${{ env.REPO_LC }}/freeradius:main \
              docker compose up -d
              docker image prune -f
            "
